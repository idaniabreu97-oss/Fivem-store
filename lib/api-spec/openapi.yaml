openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FiveM Script Store API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: scripts
    description: Script listings
  - name: categories
    description: Script categories
  - name: cart
    description: Cart operations
  - name: orders
    description: Order management
  - name: reviews
    description: Script reviews
  - name: store
    description: Store info and stats
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /scripts:
    get:
      operationId: listScripts
      tags: [scripts]
      summary: List all scripts
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: featured
          in: query
          schema:
            type: boolean
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [price_asc, price_desc, newest, popular]
      responses:
        "200":
          description: List of scripts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Script"
    post:
      operationId: createScript
      tags: [scripts]
      summary: Create a new script
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScriptRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Script"

  /scripts/{id}:
    get:
      operationId: getScript
      tags: [scripts]
      summary: Get script by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Script found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Script"
        "404":
          description: Not found
    put:
      operationId: updateScript
      tags: [scripts]
      summary: Update a script
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScriptRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Script"
    delete:
      operationId: deleteScript
      tags: [scripts]
      summary: Delete a script
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List all orders
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /scripts/{scriptId}/reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      summary: List reviews for a script
      parameters:
        - name: scriptId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviews list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Post a review
      parameters:
        - name: scriptId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewRequest"
      responses:
        "201":
          description: Review posted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /store/stats:
    get:
      operationId: getStoreStats
      tags: [store]
      summary: Get store overview stats
      responses:
        "200":
          description: Store stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreStats"

  /store/featured:
    get:
      operationId: getFeaturedScripts
      tags: [store]
      summary: Get featured/popular scripts for the homepage
      responses:
        "200":
          description: Featured scripts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Script"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Script:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        longDescription:
          type: string
        price:
          type: number
        categoryId:
          type: integer
        categoryName:
          type: string
        imageUrl:
          type: string
        previewImages:
          type: array
          items:
            type: string
        version:
          type: string
        escrowProtected:
          type: boolean
        featured:
          type: boolean
        downloadCount:
          type: integer
        averageRating:
          type: number
        reviewCount:
          type: integer
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - slug
        - description
        - price
        - categoryId
        - escrowProtected
        - featured
        - downloadCount

    CreateScriptRequest:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        longDescription:
          type: string
        price:
          type: number
        categoryId:
          type: integer
        imageUrl:
          type: string
        previewImages:
          type: array
          items:
            type: string
        version:
          type: string
        escrowProtected:
          type: boolean
        featured:
          type: boolean
        tags:
          type: array
          items:
            type: string
      required:
        - name
        - slug
        - description
        - price
        - categoryId

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        iconName:
          type: string
        scriptCount:
          type: integer
      required:
        - id
        - name
        - slug

    CreateCategoryRequest:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        iconName:
          type: string
      required:
        - name
        - slug

    Order:
      type: object
      properties:
        id:
          type: integer
        customerEmail:
          type: string
        customerName:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        totalAmount:
          type: number
        status:
          type: string
          enum: [pending, paid, delivered, cancelled]
        escrowKeys:
          type: array
          items:
            type: string
        createdAt:
          type: string
      required:
        - id
        - customerEmail
        - items
        - totalAmount
        - status

    OrderItem:
      type: object
      properties:
        scriptId:
          type: integer
        scriptName:
          type: string
        price:
          type: number
        escrowKey:
          type: string
      required:
        - scriptId
        - price

    CreateOrderRequest:
      type: object
      properties:
        customerEmail:
          type: string
        customerName:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              scriptId:
                type: integer
            required:
              - scriptId
      required:
        - customerEmail
        - items

    Review:
      type: object
      properties:
        id:
          type: integer
        scriptId:
          type: integer
        authorName:
          type: string
        rating:
          type: integer
        comment:
          type: string
        createdAt:
          type: string
      required:
        - id
        - scriptId
        - authorName
        - rating

    CreateReviewRequest:
      type: object
      properties:
        authorName:
          type: string
        rating:
          type: integer
        comment:
          type: string
      required:
        - authorName
        - rating

    StoreStats:
      type: object
      properties:
        totalScripts:
          type: integer
        totalOrders:
          type: integer
        totalRevenue:
          type: number
        totalCustomers:
          type: integer
        popularCategories:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              count:
                type: integer
            required:
              - name
              - count
      required:
        - totalScripts
        - totalOrders
        - totalRevenue
        - totalCustomers
